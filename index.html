<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiftGenie AI | Find the Perfect Gift</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="logo">GiftGenie <span>AI</span></div>
        <div class="nav-links" id="navLinks">
            <a href="#" id="homeNav">Home</a>
            <a href="#" id="favoritesNav">Favorites</a>
            <a href="#" id="occasionsNav">Occasions</a>
            <button id="authBtn" class="premium-btn">Login</button>
        </div>
    </nav>

    <main id="appContent">
        <section class="hero glass">
            <div class="hero-text">
                <h1>Find the <span>Perfect Gift</span> with AI</h1>
                <p>Personalized recommendations for any occasion, powered by advanced artificial intelligence.</p>
                <div class="search-box">
                    <input type="text" id="interestInput"
                        placeholder="What are their interests? (e.g. gaming, coffee, coding)">
                    <button id="recommendBtn" class="search-btn">Generate Ideas</button>
                </div>
                <div class="filters">
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="home">Home & Decor</option>
                        <option value="fashion">Fashion</option>
                        <option value="experience">Experiences</option>
                    </select>
                    <select id="budgetFilter">
                        <option value="">Any Budget</option>
                        <option value="0-50">$0 - $50</option>
                        <option value="50-150">$50 - $150</option>
                        <option value="150+">$150+</option>
                    </select>
                    <button id="startQuizBtn" class="premium-btn"
                        style="background: var(--accent); color: var(--bg);">Take Quiz</button>
                </div>
            </div>
            <div class="hero-image">
                <div class="image-wrapper">
                    <!-- Image will be injected via JS or CSS background -->
                </div>
            </div>
        </section>

        <!-- Quiz View -->
        <section id="quizSection" class="glass" style="display: none; padding: 3rem; margin: 2rem 10%;">
            <h2 id="quizTitle">MBTI Personality Quiz</h2>
            <div id="quizContainer"></div>
            <div class="navigation-btns">
                <button id="prevBtn" class="premium-btn" style="display: none;">Previous</button>
                <button id="nextBtn" class="premium-btn">Next</button>
            </div>
        </section>

        <!-- Customization View -->
        <section id="customSection" class="glass"
            style="display: none; padding: 3rem; margin: 2rem 10%; grid-template-columns: 1fr 1fr; gap: 2rem;">
            <div class="custom-controls">
                <h2>Customize Your Gift</h2>
                <input type="text" id="custName" placeholder="Recipient Name">
                <textarea id="custMessage" placeholder="Custom Message"></textarea>
                <div class="style-previews">
                    <p>Personality Theme: <span id="themeName">Default</span></p>
                </div>
                <button id="saveDesignBtn" class="premium-btn">Save Design</button>
            </div>
            <div class="mockup-preview">
                <canvas id="mockupCanvas" width="400" height="400" style="width: 100%; border-radius: 20px;"></canvas>
            </div>
        </section>

        <section id="resultsSection" class="results-grid"></section>
    </main>

    <!-- Auth Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content glass">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Login</h2>
            <form id="authForm">
                <input type="email" id="emailInput" placeholder="Email" required>
                <input type="password" id="passwordInput" placeholder="Password" required>
                <input type="text" id="nameInput" placeholder="Name (for Register)" style="display: none;">
                <button type="submit" id="submitAuth" class="premium-btn">Login</button>
                <p id="toggleAuth">Don't have an account? <span>Register</span></p>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
